<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Benton Drones Lead Ingest</title>
  <meta http-equiv="refresh" content="0; url=docs/training-guide.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --olive: #809948;
      --olive-dark: #6f853d;
      --cream: #fffce7;
      --page-bg: #f7f7f3;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      letter-spacing: 0.04rem;
      background: var(--page-bg);
      color: var(--olive-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--olive);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    }
    img { height: 56px; width: auto; margin-bottom: 24px; }
    h1 { margin: 0 0 12px; font-size: 1.6rem; font-weight: 700; color: var(--olive); }
    p { margin: 0 0 24px; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 8px;
      background: var(--olive);
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06rem;
      font-size: 0.85rem;
    }
    a:hover { background: var(--olive-dark); }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://www.bentondrones.com/cdn/shop/files/BENTON_DRONES_WEBSITE_LOGO.png?v=1715201940&width=500" alt="Benton Drones logo">
    <h1>Lead Ingest System</h1>
    <p>Redirecting to the training guide. If you are not redirected, click below.</p>
    <a href="docs/training-guide.html">Open Training Guide</a>
  </div>
</body>
</html>
