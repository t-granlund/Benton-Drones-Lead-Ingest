# Benton Drones Lead Ingest — nginx reverse proxy
#
# Pairs with certbot for TLS.  Forwards X-Forwarded-Proto so the app
# sets Secure cookies automatically.
#
# Usage:
#   1. Install nginx + certbot (https://certbot.eff.org/)
#   2. Copy this file to /etc/nginx/sites-available/ and symlink to sites-enabled/
#   3. Replace leads.bentondrones.com with your domain
#   4. certbot --nginx -d leads.bentondrones.com
#   5. nginx -t && systemctl reload nginx
#
# The app should be running on 127.0.0.1:8000 (default).

server {
    listen 80;
    server_name leads.bentondrones.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leads.bentondrones.com;

    # TLS certs managed by certbot
    # ssl_certificate /etc/letsencrypt/live/leads.bentondrones.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/leads.bentondrones.com/privkey.pem;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers (defense in depth — the app also sets these)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Proxy to the Python stdlib server
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static assets — long cache
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400" always;
    }
}
